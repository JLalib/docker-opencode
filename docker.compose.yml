services:
  opencode:
    # Imagen con soporte ARM64 (Raspberry Pi, Apple Silicon)
    image: smanx/opencode:latest
    container_name: opencode
    ports:
      - "${OPENCODE_PORT:-4096}:4096"
    environment:
      # Autenticación del servidor web. Descomenta las 2 siguientes líneas si quieres activarlo, lo mismo en .env
#      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD}
#      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}

      # Proveedor NVIDIA
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
    volumes:
      # Persistencia local en ./ subcarpetas (mapeadas como en el repo original)
      - ./config:/root/.config/opencode
      - ./data:/root/.local/share/opencode
      - ./workspace:/workspace
    restart: unless-stopped
genbyte@raspberrypi:~/docker/opencode $
